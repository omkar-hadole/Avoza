name: Deploy to AWS EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: SSH Deploy to EC2
    runs-on: ubuntu-latest
    needs: [] # Add your CI job name here if you want to gate on tests first

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Deploy via SSH to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            echo "=== Navigating to project directory ==="
            cd /home/ubuntu/avoza || { echo "Project dir not found"; exit 1; }

            echo "=== Pulling latest code ==="
            git pull origin main

            echo "=== Installing backend dependencies ==="
            cd backend
            npm ci --omit=dev

            echo "=== Installing frontend dependencies and building ==="
            cd ../frontend
            npm ci
            npm run build

            echo "=== Restarting backend via PM2 (idempotent) ==="
            cd ..
            pm2 describe avoza-backend > /dev/null 2>&1 \
              && pm2 restart avoza-backend \
              || pm2 start backend/server.js --name avoza-backend

            pm2 save

            echo "=== Deployment complete ==="