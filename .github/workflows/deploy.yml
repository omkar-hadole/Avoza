name: Deploy to ECS

on:
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  TF_VAR_aws_region: ${{ secrets.AWS_REGION }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Write .env file
        working-directory: ./backend
        run: |
          if [ -n "${{ secrets.APP_ENV }}" ]; then
            printf '%s\n' "${{ secrets.APP_ENV }}" > .env
          else
            echo "MONGO_URI=mongodb://localhost:27017/test" > .env
            echo "JWT_SECRET=testsecret" >> .env
          fi
          
      - name: Install Dependencies
        working-directory: ./backend
        run: npm ci
        
      - name: Run Tests
        working-directory: ./backend
        run: npm run test:integration -- --reporters=default --reporters=jest-junit --testResultsProcessor=jest-junit
        
      - name: Upload Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: backend/test-results/*.xml

  terraform:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      ecr_url: ${{ steps.tf-out.outputs.ecr_url }}
      ecs_cluster: ${{ steps.tf-out.outputs.ecs_cluster }}
      ecs_service: ${{ steps.tf-out.outputs.ecs_service }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Bootstrap S3 Bucket for State
        run: |
          BUCKET="${{ secrets.TF_BACKEND_BUCKET }}"
          if [ -z "$BUCKET" ]; then
            BUCKET="avoza-tfstate"
          fi
          
          if ! aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
            echo "Creating bucket $BUCKET"
            if [ "${{ secrets.AWS_REGION }}" == "us-east-1" ]; then
              aws s3api create-bucket --bucket "$BUCKET" --region ${{ secrets.AWS_REGION }}
            else
              aws s3api create-bucket --bucket "$BUCKET" --region ${{ secrets.AWS_REGION }} --create-bucket-configuration LocationConstraint=${{ secrets.AWS_REGION }}
            fi
            aws s3api put-bucket-versioning --bucket "$BUCKET" --versioning-configuration Status=Enabled
            aws s3api put-bucket-encryption --bucket "$BUCKET" --server-side-encryption-configuration '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'
            aws s3api put-public-access-block --bucket "$BUCKET" --public-access-block-configuration "BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true"
          else
            echo "Bucket $BUCKET already exists."
          fi
          echo "TF_STATE_BUCKET=$BUCKET" >> $GITHUB_ENV

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Parse APP_ENV into Terraform vars
        run: |
          ENV_CONTENT="${{ secrets.APP_ENV }}"
          MONGO=$(echo "$ENV_CONTENT" | awk -F= '/^MONGO_URI=/{print $2}' | head -1)
          JWT=$(echo "$ENV_CONTENT" | awk -F= '/^JWT_SECRET=/{print $2}' | head -1 | tr -d "'\"")
          if [ -z "$MONGO" ] || [ -z "$JWT" ]; then
            echo "APP_ENV must contain MONGO_URI and JWT_SECRET lines. Using defaults for terraform validation."
            MONGO="mongodb://localhost:27017/avoza"
            JWT="dummy_secret"
          fi
          echo "TF_VAR_mongo_uri=$MONGO" >> $GITHUB_ENV
          echo "TF_VAR_jwt_secret=$JWT" >> $GITHUB_ENV

      - name: Terraform Init
        working-directory: ./terraform
        run: |
          terraform init \
            -backend-config="bucket=$TF_STATE_BUCKET" \
            -backend-config="key=avoza/terraform.tfstate" \
            -backend-config="region=${{ secrets.AWS_REGION }}"

      - name: Terraform Validate
        working-directory: ./terraform
        run: terraform validate

      - name: Terraform Plan
        working-directory: ./terraform
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        working-directory: ./terraform
        run: terraform apply -auto-approve tfplan

      - name: Terraform Outputs
        id: tf-out
        working-directory: ./terraform
        run: |
          echo "ecr_url=$(terraform output -raw ecr_repository_url)" >> $GITHUB_OUTPUT
          echo "ecs_cluster=$(terraform output -raw ecs_cluster_name)" >> $GITHUB_OUTPUT
          echo "ecs_service=$(terraform output -raw ecs_service_name)" >> $GITHUB_OUTPUT

  deploy:
    needs: terraform
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        working-directory: ./backend
        run: |
          ECR_URL="${ECR_REGISTRY}/avoza-backend-production"
          docker build -t $ECR_URL:$IMAGE_TAG -t $ECR_URL:latest .
          docker push $ECR_URL:$IMAGE_TAG
          docker push $ECR_URL:latest
          echo "ECR_URL=$ECR_URL" >> $GITHUB_ENV

      - name: Download Task Definition
        env:
          ECS_SERVICE: "avoza-service-production"
        run: |
          aws ecs describe-task-definition --task-definition $ECS_SERVICE --query taskDefinition --output json > task-def.json

      - name: Fill in the new image ID in the Amazon ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def.json
          container-name: avoza-backend
          image: ${{ env.ECR_URL }}:${{ github.sha }}

      - name: Deploy Amazon ECS task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: "avoza-service-production"
          cluster: "avoza-cluster-production"
          wait-for-service-stability: true

      - name: Verify Service Status
        env:
          ECS_CLUSTER: "avoza-cluster-production"
          ECS_SERVICE: "avoza-service-production"
        run: |
          STATUS=$(aws ecs describe-services --cluster $ECS_CLUSTER --services $ECS_SERVICE --query "services[0].status" --output text)
          if [ "$STATUS" != "ACTIVE" ]; then
            echo "ECS Service is not ACTIVE, status: $STATUS"
            exit 1
          fi
          
          RUNNING_TASKS=$(aws ecs describe-services --cluster $ECS_CLUSTER --services $ECS_SERVICE --query "services[0].runningCount" --output text)
          if [ "$RUNNING_TASKS" -eq 0 ]; then
             echo "No tasks are currently running!"
             exit 1
          fi
          
          echo "ECS Service is ACTIVE with $RUNNING_TASKS running task(s)."