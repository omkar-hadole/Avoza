###############################################################################
# .github/workflows/main.yml
#
# Avoza — Production CI/CD Pipeline
#
# Flow:
#   Push / PR → Tests (backend + frontend) → Terraform Apply
#               → Docker Build & Push to ECR → Deploy to ECS Fargate
#
# Required GitHub Secrets:
#   AWS_ACCESS_KEY_ID     — AWS Academy key
#   AWS_SECRET_ACCESS_KEY — AWS Academy secret
#   AWS_SESSION_TOKEN     — AWS Academy session token
#   AWS_REGION            — e.g. us-east-1
#   AWS_ACCOUNT_ID        — 12-digit AWS account number
#   APP_ENV               — paste the full contents of your backend/.env file here
#
# Optional:
#   TF_BACKEND_BUCKET     — defaults to "avoza-tfstate"
###############################################################################

name: "🚀 Avoza CI/CD Pipeline"

on:
  workflow_dispatch:

# Cancel any in-progress run for the same branch/PR (saves minutes)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION:          ${{ secrets.AWS_REGION }}
  AWS_ACCOUNT_ID:      ${{ secrets.AWS_ACCOUNT_ID }}
  ECR_REPOSITORY:      avoza-backend-production
  ECS_CLUSTER:         avoza-cluster-production
  ECS_SERVICE:         avoza-service-production
  TF_BACKEND_BUCKET:   ${{ secrets.TF_BACKEND_BUCKET || 'avoza-tfstate' }}
  NODE_VERSION:        "20"
  TF_VERSION:          "1.9.8"

###############################################################################
# ── PHASE 1: Tests ────────────────────────────────────────────────────────────
###############################################################################

jobs:
  # ── Backend tests ──────────────────────────────────────────────────────────
  test-backend:
    name: "🧪 Backend Tests"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: "⬇️  Checkout"
        uses: actions/checkout@v4

      - name: "📝 Write .env from APP_ENV secret"
        run: printf '%s' "$APP_ENV" > .env
        env:
          APP_ENV: ${{ secrets.APP_ENV }}

      - name: "🟢 Setup Node ${{ env.NODE_VERSION }}"
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: "📦 Install dependencies"
        run: npm ci

      - name: "🔍 ESLint"
        run: npm run lint

      - name: "🧪 Unit tests (with JUnit report)"
        run: |
          npm test -- \
            --reporters=default \
            --reporters=jest-junit \
            --testResultsProcessor=jest-junit
        env:
          JEST_JUNIT_OUTPUT_DIR: ./test-results
          JEST_JUNIT_OUTPUT_NAME: unit-results.xml

      - name: "🧪 Integration tests (with JUnit report)"
        run: |
          npm run test:integration -- \
            --reporters=default \
            --reporters=jest-junit \
            --testResultsProcessor=jest-junit
        env:
          JEST_JUNIT_OUTPUT_DIR: ./test-results
          JEST_JUNIT_OUTPUT_NAME: integration-results.xml

      - name: "📊 Upload test results"
        uses: actions/upload-artifact@v4
        if: always()           # upload even if tests fail
        with:
          name: backend-test-results
          path: backend/test-results/*.xml
          retention-days: 14

  # ── Frontend build ─────────────────────────────────────────────────────────
  test-frontend:
    name: "🖥️  Frontend Lint & Build"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: "⬇️  Checkout"
        uses: actions/checkout@v4

      - name: "🟢 Setup Node ${{ env.NODE_VERSION }}"
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: "📦 Install dependencies"
        run: npm ci

      - name: "🔍 ESLint"
        run: npm run lint

      - name: "🏗️  Production build"
        run: npm run build

      - name: "📦 Upload build artifact"
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

###############################################################################
# ── PHASE 2: Terraform ───────────────────────────────────────────────────────
###############################################################################

  terraform:
    name: "🏗️  Terraform Apply"
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    # Only apply on pushes to main (not PRs)
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    env:
      TF_INPUT: "false"
      TF_VAR_aws_region: ${{ secrets.AWS_REGION }}
      # MONGO_URI and JWT_SECRET are parsed from APP_ENV in a step below

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: "⬇️  Checkout"
        uses: actions/checkout@v4

      - name: "🔑 Configure AWS credentials"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: "🏗️  Setup Terraform ${{ env.TF_VERSION }}"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: "💾 Cache Terraform providers"
        uses: actions/cache@v4
        with:
          path: terraform/.terraform
          key: terraform-${{ runner.os }}-${{ hashFiles('terraform/.terraform.lock.hcl') }}
          restore-keys: terraform-${{ runner.os }}-

      - name: "🔍 Validate required secrets"
        run: |
          MISSING=""
          [ -z "${{ secrets.APP_ENV }}" ] && MISSING="$MISSING APP_ENV"
          if [ -n "$MISSING" ]; then
            echo "Missing required GitHub Secrets:$MISSING"
            echo "Go to: Settings > Secrets and Variables > Actions"
            exit 1
          fi
          echo "All required secrets are present."
        working-directory: .

      - name: "🔧 Parse APP_ENV into Terraform vars"
        run: |
          ENV_CONTENT="$APP_ENV"
          MONGO=$(echo "$ENV_CONTENT" | grep '^MONGO_URI=' | head -1 | cut -d= -f2-)
          JWT=$(echo "$ENV_CONTENT" | grep '^JWT_SECRET=' | head -1 | cut -d= -f2- | tr -d "'")
          if [ -z "$MONGO" ] || [ -z "$JWT" ]; then
            echo "APP_ENV must contain MONGO_URI and JWT_SECRET lines."
            exit 1
          fi
          echo "TF_VAR_mongo_uri=$MONGO" >> $GITHUB_ENV
          echo "TF_VAR_jwt_secret=$JWT" >> $GITHUB_ENV
          echo "Parsed MONGO_URI and JWT_SECRET from APP_ENV."
        env:
          APP_ENV: ${{ secrets.APP_ENV }}
        working-directory: .

      - name: "🪣 Bootstrap Terraform state bucket (idempotent)"
        run: |
          BUCKET="${{ env.TF_BACKEND_BUCKET }}"
          REGION="${{ secrets.AWS_REGION }}"

          if aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
            echo "✅ State bucket '$BUCKET' already exists — skipping."
          else
            echo "Creating S3 state bucket '$BUCKET' in $REGION..."
            if [ "$REGION" = "us-east-1" ]; then
              aws s3api create-bucket --bucket "$BUCKET" --region "$REGION"
            else
              aws s3api create-bucket --bucket "$BUCKET" --region "$REGION" \
                --create-bucket-configuration LocationConstraint="$REGION"
            fi

            aws s3api put-bucket-versioning \
              --bucket "$BUCKET" \
              --versioning-configuration Status=Enabled

            aws s3api put-bucket-encryption \
              --bucket "$BUCKET" \
              --server-side-encryption-configuration \
              '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'

            aws s3api put-public-access-block \
              --bucket "$BUCKET" \
              --public-access-block-configuration \
              "BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true"

            echo "✅ State bucket created and secured."
          fi
        working-directory: .

      - name: "📥 Terraform Init"
        run: |
          terraform init \
            -backend-config="bucket=${{ env.TF_BACKEND_BUCKET }}" \
            -backend-config="key=avoza/terraform.tfstate" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="encrypt=true"

      - name: "✅ Terraform Validate"
        run: terraform validate -no-color

      - name: "📋 Terraform Plan"
        id: plan
        run: |
          terraform plan \
            -var="image_tag=latest" \
            -out=tfplan \
            -no-color 2>&1 | tee plan.txt
        continue-on-error: true

      - name: "📊 Comment plan on PR"
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/plan.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.slice(0, 60000) + '\n...[truncated]' : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🏗️ Terraform Plan\n\`\`\`hcl\n${truncated}\n\`\`\``
            });

      - name: "🚀 Terraform Apply"
        if: steps.plan.outcome == 'success'
        run: terraform apply -auto-approve tfplan

      - name: "📤 Export Terraform outputs"
        id: tf-outputs
        run: |
          echo "ecr_url=$(terraform output -raw ecr_repository_url)" >> $GITHUB_OUTPUT
          echo "ecs_cluster=$(terraform output -raw ecs_cluster_name)" >> $GITHUB_OUTPUT
          echo "ecs_service=$(terraform output -raw ecs_service_name)" >> $GITHUB_OUTPUT

    outputs:
      ecr_url:     ${{ steps.tf-outputs.outputs.ecr_url }}
      ecs_cluster: ${{ steps.tf-outputs.outputs.ecs_cluster }}
      ecs_service: ${{ steps.tf-outputs.outputs.ecs_service }}

###############################################################################
# ── PHASE 3 + 4: Docker Build, Push & ECS Deploy ─────────────────────────────
###############################################################################

  deploy:
    name: "🐳 Build, Push & Deploy to ECS"
    runs-on: ubuntu-latest
    needs: [terraform]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: "⬇️  Checkout"
        uses: actions/checkout@v4

      # ── Compute deterministic image tag ─────────────────────────────────────
      - name: "🏷️  Compute image tag"
        id: tag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TAG="sha-${SHORT_SHA}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Image tag: $TAG"

      # ── AWS credentials ─────────────────────────────────────────────────────
      - name: "🔑 Configure AWS credentials"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ secrets.AWS_REGION }}

      # ── ECR Login ───────────────────────────────────────────────────────────
      - name: "🔐 Login to Amazon ECR"
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # ── Docker layer cache ──────────────────────────────────────────────────
      - name: "💾 Cache Docker layers"
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: buildx-${{ runner.os }}-${{ hashFiles('backend/package-lock.json', 'backend/Dockerfile') }}
          restore-keys: buildx-${{ runner.os }}-

      # ── Setup Buildx ────────────────────────────────────────────────────────
      - name: "🔧 Set up Docker Buildx"
        uses: docker/setup-buildx-action@v3

      # ── Build & Push ─────────────────────────────────────────────────────────
      - name: "🏗️  Build & Push Docker image"
        uses: docker/build-push-action@v5
        with:
          context:    ./backend
          file:       ./backend/Dockerfile
          push:       true
          tags: |
            ${{ needs.terraform.outputs.ecr_url }}:${{ steps.tag.outputs.tag }}
            ${{ needs.terraform.outputs.ecr_url }}:latest
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to:   type=local,dest=/tmp/.buildx-cache-new,mode=max
          build-args: |
            NODE_ENV=production

      # ── Rotate cache (prevents unbounded growth) ─────────────────────────────
      - name: "🔄 Rotate build cache"
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      # ── Update ECS task definition with new image ─────────────────────────────
      - name: "📋 Get current task definition"
        id: get-task-def
        run: |
          aws ecs describe-task-definition \
            --task-definition "${{ env.ECS_SERVICE }}" \
            --query taskDefinition \
            --output json > task-def.json
          echo "Task definition fetched."

      - name: "🔄 Update task definition image"
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition:  task-def.json
          container-name:   avoza-backend
          image:            ${{ needs.terraform.outputs.ecr_url }}:${{ steps.tag.outputs.tag }}

      - name: "🚀 Deploy to ECS Fargate"
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition:        ${{ steps.task-def.outputs.task-definition }}
          service:                ${{ needs.terraform.outputs.ecs_service }}
          cluster:                ${{ needs.terraform.outputs.ecs_cluster }}
          wait-for-service-stability: true

      # ── Post-deploy verification ──────────────────────────────────────────────
      - name: "✅ Verify deployment"
        run: |
          echo "Verifying ECS service health..."
          aws ecs describe-services \
            --cluster "${{ needs.terraform.outputs.ecs_cluster }}" \
            --services "${{ needs.terraform.outputs.ecs_service }}" \
            --region "${{ env.AWS_REGION }}" \
            --query 'services[0].{Status:status, Running:runningCount, Desired:desiredCount, Pending:pendingCount}' \
            --output table

          echo ""
          echo "Tasks are accessible via their public IPs (port 5000)."
          echo "Find IPs: AWS Console > ECS > ${{ needs.terraform.outputs.ecs_cluster }} > Tasks > public IP"

      # ── Summary ───────────────────────────────────────────────────────────────
      - name: "📊 Job summary"
        if: always()
        run: |
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## Avoza Deployment Summary

          | Field | Value |
          |---|---|
          | **Image Tag** | ${{ steps.tag.outputs.tag }} |
          | **ECR Image** | ${{ needs.terraform.outputs.ecr_url }}:${{ steps.tag.outputs.tag }} |
          | **ECS Cluster** | ${{ needs.terraform.outputs.ecs_cluster }} |
          | **ECS Service** | ${{ needs.terraform.outputs.ecs_service }} |
          | **Access** | Task public IP on port 5000 (ECS Console > Tasks) |
          | **Commit** | ${{ github.sha }} |
          EOF

###############################################################################
# ── Automatic rollback on deploy failure ──────────────────────────────────────
###############################################################################

  rollback:
    name: "⏪ Auto-Rollback"
    runs-on: ubuntu-latest
    needs: [terraform, deploy]
    if: |
      always() &&
      needs.deploy.result == 'failure' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      github.ref == 'refs/heads/main'

    steps:
      - name: "⬇️  Checkout"
        uses: actions/checkout@v4

      - name: "🔑 Configure AWS credentials"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: "⏪ Execute rollback"
        run: |
          chmod +x scripts/rollback.sh
          ECS_CLUSTER="${{ needs.terraform.outputs.ecs_cluster }}" \
          ECS_SERVICE="${{ needs.terraform.outputs.ecs_service }}" \
          AWS_REGION="${{ env.AWS_REGION }}" \
          bash scripts/rollback.sh

      - name: "📬 Rollback notification"
        run: |
          echo "::error::Deployment failed! Auto-rollback was triggered."
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## ⚠️ Auto-Rollback Triggered

          The deployment to ECS failed. The service has been rolled back to the
          previous stable task definition revision.

          **Commit:** [${{ github.sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
          EOF
